services:
  family-app:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_FAMILY_APP_LAN_ADDRESS: "${FAMILY_APP_LAN_ADDRESS:-}"
        NEXT_PUBLIC_FAMILY_APP_AUTH_REQUIRED: "${NEXT_PUBLIC_FAMILY_APP_AUTH_REQUIRED:-false}"
        NEXT_PUBLIC_FAMILY_APP_AUTH_PROVIDER: "${NEXT_PUBLIC_FAMILY_APP_AUTH_PROVIDER:-}"
        NEXT_PUBLIC_SUPABASE_URL: "${NEXT_PUBLIC_SUPABASE_URL:-}"
        NEXT_PUBLIC_SUPABASE_PUBLIC_URL: "${NEXT_PUBLIC_SUPABASE_PUBLIC_URL:-}"
        NEXT_PUBLIC_SUPABASE_ANON_KEY: "${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}"
        NEXT_PUBLIC_SUPABASE_LAN_PORT: "${NEXT_PUBLIC_SUPABASE_LAN_PORT:-8000}"
    ports:
      - "${FAMILY_APP_PORT:-3000}:3000"
    environment:
      FAMILY_APP_ALLOW_FILE_FALLBACK: "${FAMILY_APP_ALLOW_FILE_FALLBACK:-true}"
      FAMILY_APP_DEMO_DATA: "false"
      NEXT_PUBLIC_FAMILY_APP_AUTH_REQUIRED: "${NEXT_PUBLIC_FAMILY_APP_AUTH_REQUIRED:-false}"
      NEXT_PUBLIC_FAMILY_APP_AUTH_PROVIDER: "${NEXT_PUBLIC_FAMILY_APP_AUTH_PROVIDER:-}"
      FAMILY_APP_AUTH_REQUIRED: "${FAMILY_APP_AUTH_REQUIRED:-false}"
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:-http://localhost:3000}"
      NEXT_PUBLIC_SUPABASE_URL: "${NEXT_PUBLIC_SUPABASE_URL:-}"
      NEXT_PUBLIC_SUPABASE_PUBLIC_URL: "${NEXT_PUBLIC_SUPABASE_PUBLIC_URL:-}"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}"
      NEXT_PUBLIC_SUPABASE_LAN_PORT: "${NEXT_PUBLIC_SUPABASE_LAN_PORT:-8000}"
      SUPABASE_INTERNAL_URL: "${SUPABASE_INTERNAL_URL:-}"
      SUPABASE_SERVICE_ROLE_KEY: "${SUPABASE_SERVICE_ROLE_KEY:-}"
      SUPABASE_VOICE_BUCKET: "${SUPABASE_VOICE_BUCKET:-voice-notes}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - family-app-data:/app/data
    restart: unless-stopped

volumes:
  family-app-data:
