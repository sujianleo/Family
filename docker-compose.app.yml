services:
  family-app:
    build:
      context: ./apps/web
      args:
        NODE_IMAGE: "${FAMILY_APP_NODE_IMAGE:-node:22-alpine}"
        NEXT_PUBLIC_FAMILY_APP_LAN_ADDRESS: "${FAMILY_APP_LAN_ADDRESS:-}"
        NEXT_PUBLIC_FAMILY_APP_AUTH_REQUIRED: "${NEXT_PUBLIC_FAMILY_APP_AUTH_REQUIRED:-false}"
        NEXT_PUBLIC_FAMILY_APP_AUTH_PROVIDER: "${NEXT_PUBLIC_FAMILY_APP_AUTH_PROVIDER:-}"
        NEXT_PUBLIC_FAMILY_APP_BACKEND: "${NEXT_PUBLIC_FAMILY_APP_BACKEND:-}"
        NEXT_PUBLIC_SUPABASE_URL: "${NEXT_PUBLIC_SUPABASE_URL:-}"
        NEXT_PUBLIC_SUPABASE_PUBLIC_URL: "${NEXT_PUBLIC_SUPABASE_PUBLIC_URL:-}"
        NEXT_PUBLIC_SUPABASE_ANON_KEY: "${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}"
        NEXT_PUBLIC_SUPABASE_LAN_PORT: "${NEXT_PUBLIC_SUPABASE_LAN_PORT:-8000}"
        NEXT_PUBLIC_VAPID_PUBLIC_KEY: "${NEXT_PUBLIC_VAPID_PUBLIC_KEY:-}"
    ports:
      - "${FAMILY_APP_PORT:-3000}:3000"
    environment:
      FAMILY_APP_ALLOW_FILE_FALLBACK: "${FAMILY_APP_ALLOW_FILE_FALLBACK:-true}"
      FAMILY_APP_DEMO_DATA: "false"
      NEXT_PUBLIC_FAMILY_APP_AUTH_REQUIRED: "${NEXT_PUBLIC_FAMILY_APP_AUTH_REQUIRED:-false}"
      NEXT_PUBLIC_FAMILY_APP_AUTH_PROVIDER: "${NEXT_PUBLIC_FAMILY_APP_AUTH_PROVIDER:-}"
      NEXT_PUBLIC_FAMILY_APP_BACKEND: "${NEXT_PUBLIC_FAMILY_APP_BACKEND:-}"
      FAMILY_APP_AUTH_REQUIRED: "${FAMILY_APP_AUTH_REQUIRED:-false}"
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:-http://localhost:3000}"
      NEXT_PUBLIC_SUPABASE_URL: "${NEXT_PUBLIC_SUPABASE_URL:-}"
      NEXT_PUBLIC_SUPABASE_PUBLIC_URL: "${NEXT_PUBLIC_SUPABASE_PUBLIC_URL:-}"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}"
      NEXT_PUBLIC_SUPABASE_LAN_PORT: "${NEXT_PUBLIC_SUPABASE_LAN_PORT:-8000}"
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: "${NEXT_PUBLIC_VAPID_PUBLIC_KEY:-}"
      VAPID_PUBLIC_KEY: "${VAPID_PUBLIC_KEY:-}"
      VAPID_PRIVATE_KEY: "${VAPID_PRIVATE_KEY:-}"
      VAPID_SUBJECT: "${VAPID_SUBJECT:-mailto:admin@example.com}"
      SUPABASE_INTERNAL_URL: "${SUPABASE_INTERNAL_URL:-}"
      SUPABASE_SERVICE_ROLE_KEY: "${SUPABASE_SERVICE_ROLE_KEY:-}"
      SUPABASE_VOICE_BUCKET: "${SUPABASE_VOICE_BUCKET:-voice-notes}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - family-app-data:/app/data
    restart: unless-stopped

volumes:
  family-app-data:
